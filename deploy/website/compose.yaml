name: opensyria-website

services:
  website-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:${WEBSITE_PROXY_PORT:-3100}:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./state/nginx-upstream.conf:/etc/nginx/website-upstream.inc:ro
    networks:
      - frontend
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  website-blue:
    image: ${WEBSITE_BLUE_IMAGE:-ghcr.io/open-syria/website:main}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '127.0.0.1:${WEBSITE_BLUE_HOST_PORT:-3101}:3000'
    networks:
      - frontend
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('node:http').get('http://127.0.0.1:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  website-green:
    image: ${WEBSITE_GREEN_IMAGE:-ghcr.io/open-syria/website:main}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '127.0.0.1:${WEBSITE_GREEN_HOST_PORT:-3102}:3000'
    networks:
      - frontend
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('node:http').get('http://127.0.0.1:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  frontend:
    driver: bridge
