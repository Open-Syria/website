version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    rebase-strategy: auto
    versioning-strategy: increase
    commit-message:
      prefix: chore
      include: scope
    groups:
      npm-dependencies:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:30'
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: chore
      include: scope
