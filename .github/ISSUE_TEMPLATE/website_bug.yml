name: Website Bug Report
description: Report reproducible incorrect behavior on opensyria.org.
title: 'bug: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the OpenSyria website.

        Use this form for reproducible website, routing, rendering, content, or tooling bugs in this repository. Dataset record corrections should be reported in the relevant dataset repository.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
      placeholder: The page rendered ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: Include route, browser, viewport, and environment when possible.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: route
    attributes:
      label: Route or Page
      description: Which page is affected?
      placeholder: /
  - type: input
    id: browser
    attributes:
      label: Browser and Device
      description: Include browser, OS, and viewport/device if relevant.
      placeholder: Chrome on Windows, iPhone Safari, Firefox on Linux
  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste only non-sensitive logs or attach screenshots.
      render: shell
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I did not include secrets, tokens, private data, or personal data.
          required: true
        - label: This is not a dataset record correction.
          required: true
