name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-website
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Release
    if: ${{ github.event_name != 'push' || (!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

  build:
    name: Build And Push Image
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    permissions:
      contents: read
      packages: write
    outputs:
      runtime-image: ${{ steps.images.outputs.runtime-image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare image names
        id: images
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repository}"
          short_sha="${GITHUB_SHA::12}"

          runtime_image="${image}:sha-${short_sha}"

          {
            echo "runtime-image=${runtime_image}"
            echo "runtime-tags<<EOF"
            echo "${runtime_image}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${image}:main"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Google tag variable
        shell: bash
        env:
          NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID }}
        run: |
          if [[ ! "$NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID" =~ ^(GTM|GT|G|AW|DC)-[A-Za-z0-9]+$ ]]; then
            echo "::error::Set production variable NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID to a real Google tag ID, such as GT-WPDWW3NR, or a Tag Manager container ID, such as GTM-ABC1234. Do not use placeholders like GTM-... or GTM-XXXXXXX."
            exit 1
          fi

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/arm64
          push: true
          tags: ${{ steps.images.outputs.runtime-tags }}
          build-args: |
            NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID=${{ vars.NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID }}
          cache-from: type=gha,scope=website-runtime
          cache-to: type=gha,mode=max,scope=website-runtime

  deploy:
    name: Deploy To opensyria-prod
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://opensyria.org
    permissions:
      contents: read
      id-token: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Connect to tailnet
        uses: tailscale/github-action@v4
        with:
          version: latest
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci
          ping: ${{ vars.DEPLOY_HOST }}

      - name: Validate deploy host variable
        shell: bash
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
        run: test -n "$DEPLOY_HOST"

      - name: Validate deploy user variable
        shell: bash
        env:
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: test -n "$DEPLOY_USER"

      - name: Validate SSH private key secret
        shell: bash
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: test -n "$DEPLOY_SSH_PRIVATE_KEY"

      - name: Validate SSH known hosts secret
        shell: bash
        env:
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: test -n "$DEPLOY_SSH_KNOWN_HOSTS"

      - name: Install SSH key
        shell: bash
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/opensyria_deploy
          chmod 600 ~/.ssh/opensyria_deploy
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Validate SSH known host entry
        shell: bash
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
        run: ssh-keygen -F "$DEPLOY_HOST" -f ~/.ssh/known_hosts >/dev/null

      - name: Check SSH access
        shell: bash
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/opensyria_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'mkdir -p /srv/opensyria/website && test -w /srv/opensyria/website'

      - name: Copy deployment files
        shell: bash
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: |
          tar -C deploy/website -czf - . \
            | ssh -i ~/.ssh/opensyria_deploy \
                -o BatchMode=yes \
                -o IdentitiesOnly=yes \
                -o StrictHostKeyChecking=yes \
                "${DEPLOY_USER}@${DEPLOY_HOST}" \
                'mkdir -p /srv/opensyria/website && tar -xzf - -C /srv/opensyria/website && chmod 700 /srv/opensyria/website/bin/*.sh'

      - name: Write runtime environment
        shell: bash
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          WEBSITE_PROXY_PORT: ${{ vars.WEBSITE_PROXY_PORT }}
          WEBSITE_BLUE_HOST_PORT: ${{ vars.WEBSITE_BLUE_HOST_PORT }}
          WEBSITE_GREEN_HOST_PORT: ${{ vars.WEBSITE_GREEN_HOST_PORT }}
          NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID }}
        run: |
          write_env() {
            printf '%s=%s\n' "$1" "$2"
          }

          {
            write_env NODE_ENV production
            write_env NEXT_TELEMETRY_DISABLED 1
            write_env HOSTNAME 0.0.0.0
            write_env PORT 3000
            write_env NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID "$NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID"
            write_env WEBSITE_PROXY_PORT "${WEBSITE_PROXY_PORT:-3100}"
            write_env WEBSITE_BLUE_HOST_PORT "${WEBSITE_BLUE_HOST_PORT:-3101}"
            write_env WEBSITE_GREEN_HOST_PORT "${WEBSITE_GREEN_HOST_PORT:-3102}"
          } | ssh -i ~/.ssh/opensyria_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'cd /srv/opensyria/website && umask 077 && tmp="$(mktemp .env.XXXXXX)" && cat > "$tmp" && chmod 600 "$tmp" && mv "$tmp" .env'

      - name: Deploy image
        shell: bash
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUNTIME_IMAGE: ${{ needs.build.outputs.runtime-image }}
        run: |
          printf -v ghcr_username_q '%q' "$GHCR_USERNAME"
          printf -v ghcr_token_q '%q' "$GHCR_TOKEN"

          ssh -i ~/.ssh/opensyria_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd /srv/opensyria/website && GHCR_USERNAME=${ghcr_username_q} GHCR_TOKEN=${ghcr_token_q} bin/deploy-blue-green.sh '${RUNTIME_IMAGE}'"

      - name: Verify private health
        shell: bash
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/opensyria_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'cd /srv/opensyria/website && bin/check.sh'

      - name: Verify Google tag source
        shell: bash
        env:
          NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID }}
        run: |
          html="$(curl -fsSL --retry 5 --retry-delay 3 https://opensyria.org/)"
          if [[ "$NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID" =~ ^GTM- ]]; then
            grep -Fq "googletagmanager.com/gtm.js" <<<"$html"
            grep -Fq "googletagmanager.com/ns.html?id=${NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID}" <<<"$html"
          else
            grep -Fq "googletagmanager.com/gtag/js?id=${NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID}" <<<"$html"
            grep -Fq "gtag('config', '${NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID}')" <<<"$html"
          fi
